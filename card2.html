<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayad Eissa - Glassmorphism Card</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="glassmorphism-theme">
    <div class="card-container">
        <div class="back-button">
            <a href="index.html" class="btn-back">← Back</a>
        </div>

        <div class="card glassmorphism-card">
            <div class="glass-bg"></div>
            
            <div class="card-content">
                <div class="avatar-container">
                    <div class="avatar-frame glass">
                        <img src="https://via.placeholder.com/200?text=Ayad+Eissa" alt="Ayad Eissa" class="avatar">
                        <div class="avatar-ring"></div>
                    </div>
                </div>

                <div class="info-section">
                    <h1 class="name">Ayad Eissa</h1>
                    <p class="title">Digital Professional</p>
                    <p class="subtitle">Creative & Innovative</p>
                </div>

                <div class="divider glass-divider"></div>

                <div class="contact-info">
                    <div class="contact-item glass-item">
                        <span class="icon">📱</span>
                        <span class="label">Phone</span>
                        <span class="value">+20 100 459 4168</span>
                    </div>
                    <div class="contact-item glass-item">
                        <span class="icon">📧</span>
                        <span class="label">Email</span>
                        <span class="value">ayadeissa24@gmail.com</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-action btn-call glass" onclick="call()">
                        <span class="icon">📞</span>
                        <span>Call</span>
                    </button>
                    <button class="btn-action btn-whatsapp glass" onclick="whatsapp()">
                        <span class="icon">💬</span>
                        <span>WhatsApp</span>
                    </button>
                    <button class="btn-action btn-email glass" onclick="email()">
                        <span class="icon">✉️</span>
                        <span>Email</span>
                    </button>
                </div>

                <div class="save-contact-section">
                    <button class="btn-save glass" onclick="downloadVCF()">
                        <span class="icon">💾</span>
                        <span>Save Contact</span>
                    </button>
                </div>
            </div>

            <div class="glass-elements">
                <div class="glass-blob blob-1"></div>
                <div class="glass-blob blob-2"></div>
                <div class="glass-blob blob-3"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        function call() {
            window.location.href = 'tel:+201004594168';
        }
        function whatsapp() {
            window.location.href = 'https://wa.me/201004594168';
        }
        function email() {
            window.location.href = 'mailto:ayadeissa24@gmail.com';
        }
        function downloadVCF() {
            const link = document.createElement('a');
            link.href = 'contact.vcf';
            link.download = 'Ayad-Eissa.vcf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
